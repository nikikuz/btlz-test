networks:
  postgres-net:
    driver: bridge

volumes:
  postgres-vol:
    driver: local

services:
  postgres:
    container_name: postgres
    image: postgres:16.1-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-vol:/var/lib/postgresql/data/pgdata
    networks:
      - postgres-net
    ports:
      - "${POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: always

  app:
    container_name: app
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      APP_PORT: ${APP_PORT}
      NODE_ENV: ${NODE_ENV}
      WB_TOKEN: ${WB_TOKEN}
      WB_API_URL: ${WB_API_URL}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      spreadsheetid: ${spreadsheetid}
    ports:
      - "5050:${APP_PORT}"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - postgres-net
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 5
    restart: always
